{% extends "base.html" %}

{% block content %}
<h1 class="blog-title">
    {{ page.title }}
</h1>
{% if page.extra.subtitle %}
  <p class="blog-post-subtitle">{{ page.extra.subtitle }}</p>
{% elif page.subtitle %}
  <p class="blog-post-subtitle">{{ page.subtitle }}</p>
{% endif %}
<p class="subtitle blog-meta">
  <strong class="blog-date">{{ page.date }}</strong> · {{ page.reading_time }} min read
</p>
{{ page.content | safe }}
{% endblock content %}
